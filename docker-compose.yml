version: '3.8'

services:
  postgres:
    image: postgres:16-alpine
    container_name: rotaapp-db
    environment:
      POSTGRES_DB: rotaapp
      POSTGRES_USER: rotauser
      POSTGRES_PASSWORD: rotapass
    ports:
      - '5432:5432'
    volumes:
      - rotaapp_pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U rotauser -d rotaapp"]
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  rotaapp_pgdata:
